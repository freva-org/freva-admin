---
- name: Getting container engine
  include_tasks: "get_container_engine.yml"

- name: Pulling containers
  shell: "{{ docker_bin }} {{ item }} || true"
  loop:
    - "stop {{ web_name }} {{ web_cache_name }} {{web_proxy_name}}"
    - "rm -f {{ web_name }} {{ web_cache_name }} {{web_cache_name}}"
    - "rmi -f  ghcr.io/freva-org/freva-web:{{ web_version }}"
    - "rmi -f  ghcr.io/freva-org/freva-nginx"
    - "network rm {{ web_name }}_{{ web_name }}"
    - "pull ghcr.io/freva-org/freva-web:{{ web_version }}"
    - "pull ghcr.io/freva-org/freva-nginx:{{ proxy_version or 'latest'}}"
    - "network create {{ web_name }}_{{ web_name }} --ipv6"
  changed_when: true

- name: Creating volumes
  include_tasks: "container-volumes.yml"

- name: Creating compose directory structure
  file:
    path: '{{ base_path }}/{{ project_name }}/compose_services'
    state: directory
    recurse: true
    owner: "{{ uid }}"
    group: "{{ gid }}"


- name: Removing old compose file
  file:
    path: "{{ compose_file }}.yml"
    state: absent

- name: Rendering templates
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - dest:  "{{ compose_file }}-app.yml"
      src: web-compose-app.j2
    - dest: "{{ compose_file }}-maintenance.yml"
      src: web-compose-maintenance.j2
    - dest: "{{ systemd_unit_dir }}/{{ web_name }}.service"
      src: systemd-container.j2

- name: Create environment file
  copy:
    content: |
      # Controls which compose profile is active.
      # Set to "maintenance" to start only nginx with a maintenance page.
      # Set to "app" for normal operation (all services).
      COMPOSE_PROFILES=app
      # COMPOSE_PROFILES=maintenance
      # Set to 1 in maintenance mode so nginx can serve a maintenance page.
      FREVA_MAINTENANCE_MODE=0
      # FREVA_MAINTENANCE_MODE=1
    dest: "{{ docker_env_path }}"
    mode: "0600"
    owner: "{{ uid }}"
    group: "{{ gid }}"
    force: false

- name: Reload systemd
  systemd:
    daemon_reload: yes
    scope: "{{ 'system' if ansible_become is true else 'user' }}"

- name: Enable and start web services
  systemd:
    name: "{{ web_name }}.service"
    enabled: true
    state: started
    scope: "{{ 'system' if ansible_become is true else 'user'}}"

- pause: seconds=30

- name: Check if service is running
  systemd:
    name: "{{ web_name }}"
    scope: "{{ 'system' if ansible_become is true else 'user'}}"
  register: service_status
  ignore_errors: true

- name: Fail if service is not running
  fail:
    msg: "{{ project_name }}-web service is not running"
  when: service_status.status.ActiveState != "active"
